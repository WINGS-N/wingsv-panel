apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: v-wingsnet
  annotations:
    cert-manager.io/issuer: "letsencrypt-http"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - v.wingsnet.org
      secretName: v-wingsnet-tls
  rules:
    - host: "v.wingsnet.org"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-service
                port:
                  number: 80
